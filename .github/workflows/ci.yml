name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (ruby ${{ matrix.ruby }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mutineer is fork-based (Linux + macOS); Prism ships with Ruby >= 3.4.
        os: [ubuntu-latest, macos-latest]
        ruby: ["3.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test
      - name: Build gem
        run: gem build mutineer.gemspec

  docs:
    name: yard strict (ruby 3.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Enforce 100% YARD documentation
        run: bundle exec rake yard:strict

  rails-integration:
    name: rails dogfood (ruby 3.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          # The Rails fixture app has its OWN isolated bundle (Rails must never
          # touch the gem's zero-dep bundle), so cache against that Gemfile.
          bundler-cache: true
          working-directory: test/fixtures/rails_app
      - name: Dogfood mutineer against a real minimal Rails app
        working-directory: test/fixtures/rails_app
        run: bin/dogfood
