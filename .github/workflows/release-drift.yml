name: Release drift

# Nags when shippable work (feat:/fix: commits) sits on main past the latest tag.
# Opens or refreshes a single "release-overdue" issue so a merge without a release
# can't quietly slip by. Publishing itself is handled by release.yml on tag push.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC — weekly backstop
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: nag if a release is overdue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need full history + tags for git describe/log
      - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1
        with:
          ruby-version: "3.4"

      - name: Detect unreleased changes and file/refresh the nag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -z "$latest_tag" ]; then echo "No tags yet — nothing to compare."; exit 0; fi

          # feat:/fix: (with or without scope) since the last tag = shippable work.
          commits="$(git log --pretty='- %h %s' "${latest_tag}..HEAD" | grep -E ' (feat|fix)(\(|:)' || true)"
          if [ -z "$commits" ]; then echo "No shippable commits since ${latest_tag}."; exit 0; fi

          ver="$(ruby -r ./lib/mutineer/version -e 'print Mutineer::VERSION')"
          if [ "v$ver" = "$latest_tag" ]; then
            next_step="Bump \`Mutineer::VERSION\` (currently \`$ver\`) and move the CHANGELOG \`[Unreleased]\` block into a dated \`[X.Y.Z]\` section, then push a matching \`vX.Y.Z\` tag."
          else
            next_step="Version is already \`$ver\` but tag \`v$ver\` was never pushed. Publish it: \`git tag v$ver && git push origin v$ver\` — the Release workflow does the rest."
          fi

          # Body is assembled from shell vars (commit subjects are data, never eval'd).
          body="$(printf 'User-facing commits have landed on \`main\` since \`%s\` without a release.\n\n**Unreleased:**\n%s\n\n**Next step:** %s\n\n_Auto-filed by the release-drift workflow. It refreshes this issue until a release goes out._\n' "$latest_tag" "$commits" "$next_step")"

          existing="$(gh issue list --state open --label release-overdue --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
            echo "Refreshed issue #$existing"
          else
            gh label create release-overdue --color B60205 --description "Unreleased changes sitting on main" 2>/dev/null || true
            gh issue create --title "🚢 Release overdue — unreleased changes on main" --label release-overdue --body "$body"
          fi
